name: Build & Deploy to EKS

# Mirrors the Jenkinsfile pipeline: build -> test -> package -> docker -> ECR -> Helm -> smoke test
on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you trigger manually from the Actions tab

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 416806138376.dkr.ecr.us-east-1.amazonaws.com   # <-- change to YOUR account/region
  IMAGE_NAME:   eks-demo
  EKS_CLUSTER:  eks-lab

# Required for OIDC auth to AWS. contents:read is enough for checkout.
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build version
        id: vars
        run: echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build & unit tests
        run: mvn -B clean verify

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          if-no-files-found: ignore

      - name: Package JAR
        run: mvn -B package -DskipTests

      # ---- AWS auth via OIDC (no stored access keys) ----
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        run: |
          docker build \
            -t "$ECR_REGISTRY/$IMAGE_NAME:${{ steps.vars.outputs.version }}" \
            -t "$ECR_REGISTRY/$IMAGE_NAME:latest" .
          docker push "$ECR_REGISTRY/$IMAGE_NAME:${{ steps.vars.outputs.version }}"
          docker push "$ECR_REGISTRY/$IMAGE_NAME:latest"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER"

      - name: Deploy with Helm
        run: |
          helm upgrade --install eks-demo ./helm/eks-demo \
            --set image.repository="$ECR_REGISTRY/$IMAGE_NAME" \
            --set image.tag="${{ steps.vars.outputs.version }}" \
            --wait --timeout 5m

      - name: Smoke test
        run: |
          echo "Waiting for LoadBalancer hostname..."
          LB=""
          for i in $(seq 1 30); do
            LB=$(kubectl get svc eks-demo -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            [ -n "$LB" ] && break
            sleep 10
          done
          if [ -z "$LB" ]; then echo "No LoadBalancer hostname assigned"; exit 1; fi
          echo "LoadBalancer: $LB"

          echo "Waiting for LB to respond..."
          for i in $(seq 1 30); do
            if curl -fs "http://$LB/health" > /dev/null 2>&1; then
              echo "Health check OK"
              echo "Response from /greet?name=GitHubActions:"
              curl "http://$LB/greet?name=GitHubActions"
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test failed - LoadBalancer did not respond"
          exit 1
